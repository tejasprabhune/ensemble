name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: cache cargo
        uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace --no-fail-fast

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: cache cargo
        uses: Swatinem/rust-cache@v2
      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
      - name: uv sync (builds the ensemble + plank extensions)
        run: uv sync
      - name: pytest (unit + mock integration)
        run: uv run pytest tests/ -v --tb=short
