# Per-million-token pricing for the models the shipped backends are
# wired against. Values are USD per 1M tokens. Models missing from
# this table contribute token totals only; the runtime omits the
# `usd` cost line for them rather than fabricating a number.
#
# Sources: provider list prices as of 2026-05. Update when a model's
# pricing changes; the lookup is exact-match on the model id the
# scenario passes to `World(...)`.

[anthropic]
"claude-opus-4-7"      = { input_per_million = 15.0, output_per_million = 75.0 }
"claude-opus-4-6"      = { input_per_million = 15.0, output_per_million = 75.0 }
"claude-sonnet-4-6"    = { input_per_million =  3.0, output_per_million = 15.0 }
"claude-sonnet-4-5"    = { input_per_million =  3.0, output_per_million = 15.0 }
"claude-haiku-4-5"     = { input_per_million =  1.0, output_per_million =  5.0 }
"claude-haiku-4-5-20251001" = { input_per_million = 1.0, output_per_million = 5.0 }

