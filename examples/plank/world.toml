# Plank world manifest. ensemble.worlds_registry reads this when a
# scenario constructs World("plank") so it knows where the python
# package and rust crate live, plus which personas and tools to
# expose by default.

[world]
name = "plank"
python_package = "plank"
rust_crate = "world"
personas_dir = "personas"

[[world.default_personas]]
name = "frustrated_power_user"

[[world.default_personas]]
name = "confused_new_user"

[[world.default_personas]]
name = "enterprise_admin"

[[world.default_personas]]
name = "patient_retail"

[[world.default_personas]]
name = "chatty_neutral"

[[world.default_tools]]
name = "open_ticket"

[[world.default_tools]]
name = "lookup_user"

[[world.default_tools]]
name = "lookup_ticket"

[[world.default_tools]]
name = "issue_refund"

[[world.default_tools]]
name = "escalate"

[[world.default_tools]]
name = "search_kb"

[[world.default_tools]]
name = "update_subscription"
